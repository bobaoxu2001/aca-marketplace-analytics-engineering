# Example profiles for cloud warehouse deployment.
# Copy relevant sections into ~/.dbt/profiles.yml and adjust credentials.
#
# Local DuckDB (default — see profiles.yml in this repo):
#   path: ../data/processed/aca_marketplace_py2026.duckdb

aca_marketplace_analytics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ../data/processed/aca_marketplace_py2026.duckdb
      schema: main
      threads: 4

    snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: ANALYTICS_ENGINEER
      database: ACA_MARKETPLACE
      warehouse: TRANSFORMING
      schema: MARTS
      threads: 4

    bigquery:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: aca_marketplace_marts
      threads: 4
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
