version: 2

sources:
  - name: raw
    description: >
      Raw CMS Plan Year 2026 ACA Marketplace Public Use Files loaded into DuckDB
      by scripts/load_to_duckdb.py.
    schema: main
    tables:
      - name: rate_puf_py2026
        description: Raw Rate PUF with age, tobacco, rating area, and monthly premium rows.
      - name: plan_attributes_puf_py2026
        description: Raw Plan Attributes PUF with plan, issuer, metal level, deductible, and network attributes.
      - name: benefits_cost_sharing_puf_py2026
        description: Raw Benefits and Cost Sharing PUF with benefit-level coverage and cost-sharing details.
      - name: service_area_puf_py2026
        description: Raw Service Area PUF with county and service area availability.
      - name: plan_id_crosswalk_puf_py2025_py2026
        description: Raw Plan ID Crosswalk PUF mapping PY2025 plans to PY2026 plans.
      - name: quality_puf_py2026
        description: Raw CMS Quality PUF with PY2026 plan-level QRS star ratings for HealthCare.gov plans.
      - name: raw_load_audit
        description: >
          Load audit metadata written by scripts/load_to_duckdb.py with row counts
          and UTC load timestamps for each raw table.
        freshness:
          warn_after: {count: 180, period: day}
          error_after: {count: 365, period: day}
        loaded_at_field: loaded_at_utc
