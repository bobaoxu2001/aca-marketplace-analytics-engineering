metrics:
  - slug: average_monthly_premium
    name: Average monthly premium
    expression: avg(fact_premium.monthly_premium)
    primary_tables: [fact_premium, dim_plan, dim_issuer]
    allowed_dimensions: [state_code, rating_area_id, issuer_id, metal_level, age_band, tobacco_usage]
    caveats: [Not enrollment weighted, Rating-area and age-band grain]
  - slug: median_silver_premium
    name: Median silver premium
    expression: median(monthly_premium) where dim_plan.metal_level = 'Silver'
    primary_tables: [fact_premium, dim_plan, dim_issuer]
    allowed_dimensions: [state_code, rating_area_id, issuer_id, age_band]
    caveats: [Public premiums only, not subsidy-adjusted]
  - slug: plan_count_by_county
    name: Plan count by county
    expression: count(distinct fact_plan_availability.plan_key)
    primary_tables: [fact_plan_availability, dim_geography, dim_plan, dim_issuer]
    allowed_dimensions: [state_code, county_name, service_area_id, metal_level, issuer_id]
    caveats: [CMS service-area county labels are used as published]
  - slug: issuer_count_by_county
    name: Issuer count by county
    expression: count(distinct fact_plan_availability.issuer_key)
    primary_tables: [fact_plan_availability, dim_geography, dim_issuer]
    allowed_dimensions: [state_code, county_name, service_area_id]
    caveats: [Counts issuer presence, not enrollment share]
  - slug: average_deductible
    name: Average deductible
    expression: avg(dim_plan.medical_deductible_integrated)
    primary_tables: [dim_plan]
    allowed_dimensions: [state_code, issuer_id, metal_level, plan_type]
    caveats: [Plan design attribute, not observed spending]
  - slug: average_oop_max
    name: Average out-of-pocket maximum
    expression: avg(dim_plan.medical_oop_max_integrated)
    primary_tables: [dim_plan]
    allowed_dimensions: [state_code, issuer_id, metal_level, plan_type]
    caveats: [Plan design attribute, not observed spending]
  - slug: benefit_coverage_rate
    name: Benefit coverage rate
    expression: sum(is_covered_flag) / count(*)
    primary_tables: [fact_benefit_cost_sharing, dim_benefit, dim_plan, dim_issuer]
    allowed_dimensions: [benefit_name, benefit_category, state_code, issuer_id, metal_level]
    caveats: [Ambiguous or null coverage values require review]
  - slug: premium_difference_by_metal
    name: Premium difference by metal level
    expression: metal-level average premium minus comparison benchmark
    primary_tables: [fact_premium, dim_plan]
    allowed_dimensions: [state_code, rating_area_id, issuer_id, metal_level]
    caveats: [Benchmark must be explicitly stated]
  - slug: plan_continuity_status
    name: Plan continuity status
    expression: count(*) by dim_plan_history.continuity_status
    primary_tables: [dim_plan_history, dim_issuer]
    allowed_dimensions: [state_code, current_issuer_id, previous_issuer_id, continuity_status]
    caveats: [Based on CMS Plan ID Crosswalk]
  - slug: quality_rating_distribution
    name: Quality rating distribution
    expression: count(*) by fact_plan_quality_rating.overall_rating_value
    primary_tables: [fact_plan_quality_rating, dim_plan]
    allowed_dimensions: [state_code, issuer_id, plan_type, metal_level, quality_rating_status]
    caveats: [Includes non-rated statuses]
  - slug: quality_vs_premium
    name: Quality vs premium
    expression: avg or median premium by overall rating where quality rows join to dim_plan
    primary_tables: [fact_plan_quality_rating, fact_premium, dim_plan]
    allowed_dimensions: [state_code, issuer_id, metal_level, overall_rating_value]
    caveats: [Association only, not causal, limited to joined plans]
